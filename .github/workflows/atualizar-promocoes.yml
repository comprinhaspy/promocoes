name: Atualizar promoções

on:
  schedule:
    # roda a cada 10 minutos
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
    # permite clicar em "Run workflow" no GitHub para testar na hora

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Buscar novas promoções e gerar textos com IA
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/processar_telegram.py

      - name: Publicar mudanças no site
        run: |
          git config user.name "bot-promocoes"
          git config user.email "bot-promocoes@users.noreply.github.com"
          git add site/promocoes.json site/fotos data/offset.txt
          git diff --cached --quiet || git commit -m "Novas promoções"
          git push
